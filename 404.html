<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>页面未找到 · 王婉婷的产品作品集</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f7f7f3; color: #171815; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
    main { width: min(100%, 620px); padding: 56px; border: 1px solid #dedfd8; background: #fcfcfa; }
    span { font: 11px monospace; color: #234f43; letter-spacing: .1em; }
    h1 { margin: 24px 0 12px; font-size: clamp(36px, 7vw, 58px); line-height: 1.12; letter-spacing: -.04em; }
    p { color: #64665f; line-height: 1.8; }
    a { display: inline-flex; margin-top: 30px; padding: 11px 18px; border-radius: 999px; background: #171815; color: white; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <span>404 · PAGE NOT FOUND</span>
    <h1>这个页面暂时不存在。</h1>
    <p>链接可能已经更新，或者项目仍在整理中。你可以返回作品集首页继续浏览。</p>
    <a id="home-link" href="./index.html">返回首页</a>
  </main>
  <script>
    (function () {
      var link = document.getElementById('home-link');
      var parts = window.location.pathname.split('/').filter(Boolean);
      var isProjectPage = window.location.hostname.endsWith('github.io') && parts.length > 0;
      link.href = isProjectPage ? '/' + parts[0] + '/' : '/';
    })();
  </script>
</body>
</html>
